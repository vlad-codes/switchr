<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switchr</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="title-bar">
    <div class="logo-mark"><div class="logo-dot"></div></div>
    <span class="title-label">SWITCHR</span>
    <div style="flex:1"></div>
    <button class="theme-toggle" id="themeToggle" title="Theme wechseln"></button>
    <div class="indicator-dots" id="indicatorDots"></div>
  </div>

  <div id="mainContent"></div>

  <div class="footer">
    <span class="footer-count" id="footerCount"></span>
  </div>

  <div class="toast hidden" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
